<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tumo AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #loading-screen {
      position: fixed; inset: 0; background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000; gap: 20px; transition: opacity 0.5s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { color: #94a3b8; font-family: system-ui, sans-serif; font-size: 15px; text-align: center; padding: 0 24px; }

    #back-btn {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      color: #fff; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px; padding: 10px 18px;
      font-size: 14px; font-weight: 600; text-decoration: none; z-index: 200;
      font-family: system-ui, sans-serif;
    }
    #scan-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      color: #e2e8f0; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px; padding: 12px 24px;
      font-size: 14px; font-weight: 500; white-space: nowrap;
      z-index: 200; font-family: system-ui, sans-serif;
      transition: opacity 0.4s;
    }
    #scan-hint.hidden { opacity: 0; }
    #debug-log {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 30vh; overflow-y: auto;
      background: rgba(0,0,0,0.85); color: #86efac;
      font-family: monospace; font-size: 11px;
      padding: 8px; z-index: 9999; pointer-events: none;
    }
    #debug-log div { padding: 1px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p id="loading-msg">Loading AR…</p>
  </div>

  <a href="index.html" id="back-btn">← Back</a>
  <div id="scan-hint" class="hidden">📷 Point at your target image</div>
  <div id="debug-log"></div>

  <!-- Hidden video asset -->
  <video id="vid0"
    src="assets/videos/inicio_optimizado.mp4"
    muted playsinline loop
    webkit-playsinline="true"
    crossorigin="anonymous"
    style="display:none">
  </video>

  <!-- Three.js + MindAR (no A-Frame) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <script>
    var loadingEl  = document.getElementById('loading-screen');
    var loadingMsg = document.getElementById('loading-msg');
    var hint       = document.getElementById('scan-hint');
    var debugEl    = document.getElementById('debug-log');
    var vid0       = document.getElementById('vid0');

    function log(msg, color) {
      console.log('[AR]', msg);
      var div = document.createElement('div');
      div.textContent = msg;
      if (color) div.style.color = color;
      debugEl.appendChild(div);
      debugEl.scrollTop = debugEl.scrollHeight;
      loadingMsg.textContent = msg;
    }

    function hideLoading() {
      loadingEl.classList.add('hidden');
      hint.classList.remove('hidden');
    }

    window.addEventListener('error', function(e) { log('JS: ' + e.message, '#f87171'); });
    window.addEventListener('unhandledrejection', function(e) { log('Promise: ' + e.reason, '#f87171'); });

    async function startAR() {
      try {
        log('Initializing MindAR…');

        var MindARThree = window.MINDAR.IMAGE.MindARThree;
        log('MindARThree: ' + (MindARThree ? 'found' : 'NOT FOUND'), MindARThree ? '#86efac' : '#f87171');

        var mindarThree = new MindARThree({
          container: document.body,
          imageTargetSrc: 'targets.mind',
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no',
        });

        log('MindAR instance created');

        var renderer = mindarThree.renderer;
        var scene    = mindarThree.scene;
        var camera   = mindarThree.camera;

        // Build video plane for target 0
        var texture  = new THREE.VideoTexture(vid0);
        var geometry = new THREE.PlaneGeometry(1, 0.5625);
        var material = new THREE.MeshBasicMaterial({ map: texture });
        var plane    = new THREE.Mesh(geometry, material);

        var anchor = mindarThree.addAnchor(0);
        anchor.group.add(plane);

        anchor.onTargetFound = function() {
          log('Target found! Playing video…', '#a78bfa');
          vid0.play().catch(function(e) { log('Video error: ' + e.message, '#f87171'); });
          hint.classList.add('hidden');
        };

        anchor.onTargetLost = function() {
          log('Target lost');
          vid0.pause();
          hint.classList.remove('hidden');
        };

        log('Starting camera…');
        await mindarThree.start();

        log('Camera live! Scan your target.', '#86efac');
        hideLoading();

        renderer.setAnimationLoop(function() {
          renderer.render(scene, camera);
        });

      } catch(e) {
        log('ERROR: ' + e.message, '#f87171');
      }
    }

    startAR();
  </script>

</body>
</html>
